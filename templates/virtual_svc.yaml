apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{.Release.Name}}-virtual-svc
  namespace: {{.Release.Namespace}}
  labels:
    {{- include "chart.labels" . | indent 4}}
spec:
  hosts:
  - '*'
  gateways:
    - istio-system/{{.Release.Name}}-gateway
  http:
    - match:
        - uri:
            prefix: /auth_v1.AuthService
      route:
        - destination:
            host: {{include "auth-chart.vs.host" .}}
            subset: v1
          weight: 100


